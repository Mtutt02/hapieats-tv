<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- TV body -->
  <rect x="10" y="18" width="80" height="58" rx="8" ry="8" fill="#1a1a2e" stroke="#e2e8f0" stroke-width="2.5"/>
  <!-- TV screen -->
  <rect x="20" y="26" width="60" height="38" rx="4" ry="4" fill="#0f172a"/>
  <!-- Screen glow -->
  <rect x="20" y="26" width="60" height="38" rx="4" ry="4" fill="url(#screenGlow)" opacity="0.3"/>
  <!-- HE text -->
  <text x="50" y="52" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="24" fill="#f97316" letter-spacing="1">HE</text>
  <!-- TV legs -->
  <line x1="25" y1="76" x2="15" y2="94" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="75" y1="76" x2="85" y2="94" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Antenna -->
  <line x1="50" y1="18" x2="35" y2="4" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="18" x2="65" y2="4" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
  <!-- Antenna tip left -->
  <circle cx="35" cy="4" r="1.5" fill="#e2e8f0"/>
  <!-- Antenna tip right -->
  <circle cx="65" cy="4" r="1.5" fill="#e2e8f0"/>
  <!-- Gradient for screen glow -->
  <defs>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
</svg>
